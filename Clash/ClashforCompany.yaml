  - {name: 🇨🇳 台湾, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Taiwan.png", type: url-test, include-all: true, tolerance: 20, interval: 600, filter: "(?=.*(台|TW|(?i)Taiwan))(?=.*BGP)^((?!(港|日|韩|新|美)).)*$, check-interval=600, tolerance=50, alive-checking=false"}
  - {name: 🇰🇷 韩国, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Korea.png", type: url-test, include-all: true, tolerance: 20, interval: 600, filter: "(?=.*(KR|Korea|KOR|首尔|韩|韓|(?i)Korea))(?=.*BGP)^((?!(香港|台湾|新加坡|美国|狮城|南朝鲜|US|SG|HK|TW|台灣|美國|獅城)).)*$"}
  - {name: 🇸🇬 新加坡, icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png", type: url-test, include-all: true, tolerance: 20, interval: 600, filter: "(?=.*(新加坡|狮城|SG|(?i)Singapore))(?=.*BGP)^((?!(香港|台湾|日本|美国|韩国|南朝鲜|US|JP|KR|HK|TW|台灣|美國|韓國)).)*$"}

# 规则匹配
rules:
  - DOMAIN-SUFFIX,v2ex.com,🌏 v2ex
  - DOMAIN-KEYWORD,notebooklm,🤖 Gemini
  - RULE-SET,Wiki,🌏 Wiki百科
  - RULE-SET,Openai,🤖 Openai
  - RULE-SET,Gemini,🤖 Gemini
  - RULE-SET,Reddit,🌏 Reddit
  - RULE-SET,Pinterest,🎨 Pinterest
  - RULE-SET,Steam,🎮 Steam
  - RULE-SET,Telegram,📲 Telegram
  - RULE-SET,Twitter,📲 Twitter
  - RULE-SET,Instagram,🎨 Instagram
  - RULE-SET,Twitch,🌏 Twitch
  
  - RULE-SET,Telegram_ip,📲 Telegram
  - RULE-SET,Twitter_ip,📲 Twitter
  - MATCH,🐟 漏网之鱼

# 规则集
## type：可选http/file/inline  behavior：可选domain/ipcidr/classical format：可选yaml/text/mrs
rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  class: &class {type: http, interval: 86400, behavior: classical, format: text}
rule-providers: 
  Wiki: { <<: *class, url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Wikipedia/Wikipedia.list"}
  
  Openai: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/openai.mrs"}
